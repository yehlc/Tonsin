<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平面圖定位</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; text-align: center; background: #f0f0f0; font-family: sans-serif; }
        .header { background: #007bff; color: white; padding: 12px; font-size: 18px; font-weight: bold; }
        .hint { padding: 10px; font-size: 14px; color: #555; }
        
        #canvas-container { 
            position: relative; 
            width: 100%; 
            display: flex;
            justify-content: center;
        }
        canvas { 
            border: 2px solid #ccc; 
            width: 95%; 
            height: auto; 
            background: #fff; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        #sendBtn { 
            display: none; margin: 15px auto; padding: 12px 24px; font-size: 18px; font-weight: bold;
            background: #1DB446; color: white; border: none; border-radius: 8px; width: 80%; 
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #sendBtn:active { background: #179038; }
    </style>
</head>
<body>
    <div class="header" id="pageTitle">平面圖載入中...</div>
    <div class="hint" id="hintText">請在下方平面圖「雙指放大」並「點擊」位置</div>
    
    <div id="canvas-container">
        <canvas id="floorPlan"></canvas>
    </div>
    
    <button id="sendBtn" onclick="sendCoordinate()">📍 送出標記座標</button>

    <script>
        const githubPagesUrl = "https://yehlc.github.io/Tonsin/"; 
        
        // ==========================================
        // ★ 統一的「工地與樓層圖庫設定區」
        // ==========================================
        // 說明：你現在只需要把 98_1F.jpg 先填給所有樓層，
        // 未來如果有對應的新圖，直接來這裡把 "98_1F.jpg" 換成新檔名即可，例如 "99_B1F.jpg"
        
        const defaultImg = "98_1F.jpg"; // 暫時統一使用的圖檔

        const floorPlanDB = {
            "98工地": {
                "全區配置圖": "98_siteplan.jpg", "戶外周邊": defaultImg, "屋頂外觀": defaultImg, "地工階段": defaultImg,
                "B1F": defaultImg, "B2F": defaultImg, "B3F": defaultImg, "B4F": defaultImg,
                "1F": "98_1F.jpg", "2F": defaultImg, "3F": defaultImg, "4F": defaultImg, "5F": defaultImg, 
                "6F": defaultImg, "7F": defaultImg, "8F": defaultImg, "9F": defaultImg, "10F": defaultImg,
                "11F": defaultImg, "12F": defaultImg, "13F": defaultImg, "14F": defaultImg, "15F": defaultImg, 
                "16F": defaultImg, "17F": defaultImg, "18F": defaultImg, "19F": defaultImg, "20F": defaultImg,
                "R1F": defaultImg, "R2F": defaultImg, "R3F": defaultImg, "PRF": defaultImg
            },
            "99工地": {
                "全區配置圖": defaultImg, "戶外周邊": defaultImg, "屋頂外觀": defaultImg, "地工階段": defaultImg,
                "B1F": defaultImg, "B2F": defaultImg, "B3F": defaultImg, "B4F": defaultImg,
                "1F": defaultImg, "2F": defaultImg, "3F": defaultImg, "4F": defaultImg, "5F": defaultImg, 
                "6F": defaultImg, "7F": defaultImg, "8F": defaultImg, "9F": defaultImg, "10F": defaultImg,
                "11F": defaultImg, "12F": defaultImg, "13F": defaultImg, "14F": defaultImg, "15F": defaultImg, 
                "16F": defaultImg, "17F": defaultImg, "18F": defaultImg, "19F": defaultImg, "20F": defaultImg,
                "R1F": defaultImg, "R2F": defaultImg, "R3F": defaultImg, "PRF": defaultImg
            },
            "95工地": {
                "全區配置圖": defaultImg, "1F": defaultImg, "2F": defaultImg // 依此類推...
            },
            "鼎隆大苑": {
                "全區配置圖": defaultImg, "1F": defaultImg, "2F": defaultImg
            },
            "毅聯R8": {
                "全區配置圖": defaultImg, "1F": defaultImg, "2F": defaultImg
            },
            "毅聯寧夏": {
                "全區配置圖": defaultImg, "1F": defaultImg, "2F": defaultImg
            },
            "內湖江南": {
                "全區配置圖": defaultImg, "1F": defaultImg, "2F": defaultImg
            },
            "內湖富樂群": {
                "全區配置圖": defaultImg, "1F": defaultImg, "2F": defaultImg
            },
            "中壢映象": {
                "全區配置圖": defaultImg, "1F": defaultImg, "2F": defaultImg
            }
        };

        // ==========================================
        // 取得網址參數
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const site = decodeURIComponent(urlParams.get('site') || "").trim(); // 拿掉 toLowerCase() 避免中文比對問題
        const floor = decodeURIComponent(urlParams.get('floor') || "").trim().toUpperCase(); // 樓層保持大寫
        const viewX = urlParams.get('x');
        const viewY = urlParams.get('y');
        const mode = urlParams.get('mode');

        if (site && floor) {
            document.getElementById('pageTitle').innerText = `${site} - ${floor} 平面圖`;
        } else {
            document.getElementById('pageTitle').innerText = "未指定案場與樓層";
        }

        // ==========================================
        // 尋找圖片路徑
        // ==========================================
        let targetImgUrl = 'https://via.placeholder.com/800x600.png?text=No+Floor+Plan+Found';
        
        // 從資料庫中比對
        if (floorPlanDB[site] && floorPlanDB[site][floor]) {
            // 將 Github 前綴與檔名組合起來
            targetImgUrl = githubPagesUrl + floorPlanDB[site][floor];
        }

        const canvas = document.getElementById('floorPlan');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.crossOrigin = "Anonymous";
        let selectedX = 0, selectedY = 0;
        let isSelected = false;
        
        img.src = targetImgUrl;

        img.onload = () => {
            canvas.width = img.width;   
            canvas.height = img.height; 
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // 唯讀模式，畫上紅點
            if (mode === 'view' && viewX && viewY) {
                const px = (parseInt(viewX) / 100) * canvas.width;
                const py = (parseInt(viewY) / 100) * canvas.height;
                
                ctx.beginPath();
                ctx.arc(px, py, Math.max(canvas.width * 0.015, 12), 0, 2 * Math.PI);
                ctx.fillStyle = 'red';
                ctx.fill();
                ctx.lineWidth = 5;
                ctx.strokeStyle = '#fff';
                ctx.stroke();
                
                document.getElementById('hintText').innerText = "📍 缺失發生位置 (可雙指放大查看細節)";
            }
        };

        img.onerror = () => {
            ctx.font = "20px Arial";
            ctx.fillText("找不到平面圖檔", 50, 50);
            console.error("嘗試載入圖片失敗:", targetImgUrl);
        };

        canvas.addEventListener('click', function(e) {
            if (mode === 'view') return; 
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;    
            const scaleY = canvas.height / rect.height;  

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            selectedX = (clientX - rect.left) * scaleX;
            selectedY = (clientY - rect.top) * scaleY;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.arc(selectedX, selectedY, Math.max(canvas.width * 0.015, 12), 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            isSelected = true;
            document.getElementById('sendBtn').style.display = 'block';
        });

        // 初始化 LIFF
        const myLiffId = "2009287087-4LSCRAq4"; 
        liff.init({ liffId: myLiffId }).catch(err => {
            console.error(err);
            document.getElementById('pageTitle').innerText = "LIFF 初始化失敗";
        });

        function sendCoordinate() {
            if (!isSelected) return;
            
            const percentX = Math.round((selectedX / canvas.width) * 100);
            const percentY = Math.round((selectedY / canvas.height) * 100);
            const coordText = `[座標] X:${percentX}%, Y:${percentY}%`;

            if (liff.isInClient()) {
                liff.sendMessages([{ 'type': 'text', 'text': coordText }])
                .then(() => liff.closeWindow())
                .catch(err => alert('發送失敗: ' + err));
            } else {
                alert(`測試模式送出：${coordText}`);
            }
        }
    </script>
</body>
</html>
