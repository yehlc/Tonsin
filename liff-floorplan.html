<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>平面圖定位</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; text-align: center; background: #f0f0f0; font-family: sans-serif; }
        .header { background: #007bff; color: white; padding: 12px; font-size: 18px; font-weight: bold; }
        .hint { padding: 10px; font-size: 14px; color: #555; }
        #canvas-container { position: relative; display: inline-block; margin-top: 5px; max-width: 100%; overflow: auto; }
        canvas { border: 2px solid #ccc; max-width: 100%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: #fff; touch-action: none; }
        #sendBtn { 
            display: none; margin: 15px auto; padding: 12px 24px; font-size: 18px; font-weight: bold;
            background: #1DB446; color: white; border: none; border-radius: 8px; width: 80%; 
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #sendBtn:active { background: #179038; }
    </style>
</head>
<body>
    <div class="header" id="pageTitle">平面圖載入中...</div>
    <div class="hint">請在下方平面圖「點擊」發生缺失的位置</div>
    
    <div id="canvas-container">
        <canvas id="floorPlan"></canvas>
    </div>
    
    <button id="sendBtn" onclick="sendCoordinate()">📍 送出標記座標</button>
        <script>
        const githubPagesUrl = "https://yehlc.github.io/Tonsin/"; 
        
        // 1. 取得網址參數
        const urlParams = new URLSearchParams(window.location.search);
        // ★ 強制轉小寫並解碼，減少比對出錯的機率
        const site = decodeURIComponent(urlParams.get('site') || "").toLowerCase();
        const floor = decodeURIComponent(urlParams.get('floor') || "").toUpperCase();
        
        const viewX = urlParams.get('x');
        const viewY = urlParams.get('y');
        const mode = urlParams.get('mode');

        // 更新網頁標題
        if (site && floor) {
            document.getElementById('pageTitle').innerText = `${site} - ${floor} 平面圖`;
        } else {
            document.getElementById('pageTitle').innerText = "未指定案場與樓層，載入預設圖";
        }

        // 2. ★ 改用 if/else 來決定圖片網址 (避開 JavaScript 物件 Key 的中文編碼問題)
        let targetImgUrl = 'https://via.placeholder.com/800x600.png?text=No+Floor+Plan+Found';
        
        if (site.indexOf("98") > -1) {
            if (floor === "1F") {
                targetImgUrl = githubPagesUrl + "98_1F.jpg";
            } else if (floor === "全區配置圖") {
                targetImgUrl = githubPagesUrl + "98_siteplan.jpg";
            }
        } 
        // 未來如果有其他工地，就這樣加：
        // else if (site.indexOf("內湖") > -1) {
        //     if (floor === "1F") targetImgUrl = githubPagesUrl + "neihu_1F.jpg";
        // }

        const canvas = document.getElementById('floorPlan');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.crossOrigin = "Anonymous";
        let selectedX = 0, selectedY = 0;
        let isSelected = false;
        
        img.src = targetImgUrl;

        img.onload = () => {
            const maxWidth = window.innerWidth * 0.95;
            const scale = maxWidth / img.width;
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // 如果是唯讀模式，一載入就畫上紅點
            if (mode === 'view' && viewX && viewY) {
                const px = (parseInt(viewX) / 100) * canvas.width;
                const py = (parseInt(viewY) / 100) * canvas.height;
                
                ctx.beginPath();
                ctx.arc(px, py, Math.max(canvas.width * 0.02, 6), 0, 2 * Math.PI);
                ctx.fillStyle = 'red';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#fff';
                ctx.stroke();
                
                document.querySelector('.hint').innerText = "📍 缺失發生位置";
            }
        };

        img.onerror = () => {
            alert(`圖片載入失敗。\n目前嘗試載入的網址是:\n${targetImgUrl}`);
        };

        // 點擊事件：如果是唯讀模式，就禁止點擊畫圖
        canvas.addEventListener('click', function(e) {
            if (mode === 'view') return; // 防呆
            
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            selectedX = clientX - rect.left;
            selectedY = clientY - rect.top;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.arc(selectedX, selectedY, Math.max(canvas.width * 0.02, 6), 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            isSelected = true;
            document.getElementById('sendBtn').style.display = 'block';
        });

        // 初始化 LIFF
        const myLiffId = "2009287087-4LSCRAq4"; 
        liff.init({ liffId: myLiffId }).catch(err => {
            console.error(err);
            document.getElementById('pageTitle').innerText = "LIFF 初始化失敗";
        });

        function sendCoordinate() {
            if (!isSelected) return;
            
            const percentX = Math.round((selectedX / canvas.width) * 100);
            const percentY = Math.round((selectedY / canvas.height) * 100);
            const coordText = `[座標] X:${percentX}%, Y:${percentY}%`;

            if (liff.isInClient()) {
                liff.sendMessages([{ 'type': 'text', 'text': coordText }])
                .then(() => liff.closeWindow())
                .catch(err => alert('發送失敗: ' + err));
            } else {
                alert(`非 LINE 環境測試成功！\n系統準備傳送文字：${coordText}`);
            }
        }
    </script>
</body>
</html>
