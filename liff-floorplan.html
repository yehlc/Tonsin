<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平面圖定位</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; text-align: center; background: #f0f0f0; font-family: sans-serif; }
        .header { background: #007bff; color: white; padding: 12px; font-size: 18px; font-weight: bold; }
        .hint { padding: 10px; font-size: 14px; color: #555; }
        
        #canvas-container { position: relative; width: 100%; display: flex; justify-content: center; }
        canvas { border: 2px solid #ccc; width: 95%; height: auto; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        #sendBtn { 
            display: none; margin: 15px auto; padding: 12px 24px; font-size: 18px; font-weight: bold;
            background: #1DB446; color: white; border: none; border-radius: 8px; width: 80%; 
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #sendBtn:active { background: #179038; }

        #defectInfoCard {
            display: none; position: fixed; bottom: 20px; left: 5%; width: 90%;
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2); text-align: left; z-index: 100;
            box-sizing: border-box; border-left: 6px solid #ff9800; 
            max-height: 85vh; overflow-y: auto;
        }

        /* ★ 修改：讓卡片內的圖片不再裁切，並加上點擊放大的游標 */
        #infoImg { 
            width: 100%; 
            max-height: 250px; 
            height: auto; 
            object-fit: contain; /* 保證全圖顯示 */
            border-radius: 8px; 
            margin-bottom: 5px; 
            background-color: #111; /* 黑色背景讓照片更清楚 */
            cursor: zoom-in; 
        }
        
        .close-btn { position: absolute; right: 15px; top: 10px; background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
        
        /* 載入動畫 */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%;
            width: 20px; height: 20px; animation: spin 1s linear infinite;
            display: inline-block; margin-right: 10px; vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ★ 新增：全螢幕看圖模式 (PlanGrid Style) */
        #fullscreenModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column;
        }
        #fullscreenImg {
            max-width: 95%; max-height: 90%; object-fit: contain;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); border-radius: 8px;
        }
        .modal-close {
            position: absolute; top: 20px; right: 20px; color: white; font-size: 35px; cursor: pointer; background: none; border: none;
        }
    </style>
</head>
<body>
    <div class="header" id="pageTitle">平面圖載入中...</div>
    <div class="hint" id="hintText">連線環境建立中...</div>
    <div id="canvas-container"><canvas id="floorPlan"></canvas></div>
    <button id="sendBtn" onclick="sendCoordinate()">📍 送出標記座標</button>

    <div id="defectInfoCard">
        <button class="close-btn" onclick="document.getElementById('defectInfoCard').style.display='none'">✖</button>
        <div id="infoStatus" style="font-weight:bold; font-size:16px; margin-bottom:6px;"></div>
        
        <div id="imgLoading" style="display:none; text-align:center; padding:20px; color:#888;">
            <div class="loader"></div> 圖片載入中...
        </div>
        
        <img id="infoImg" src="" alt="缺失照片" style="display:none;" />
        <div id="imgZoomHint" style="display:none; text-align:center; font-size:12px; color:#1DB446; margin-bottom:8px;">🔍 點擊圖片可放大查看全圖</div>
        
        <div id="infoDeptUser" style="color:#555; font-size:14px; margin-bottom:8px; margin-top:8px;"></div>
        <div id="infoDesc" style="color:#222; font-size:15px; line-height:1.4;"></div>
    </div>

    <div id="fullscreenModal" onclick="closeFullscreen()">
        <button class="modal-close">✖</button>
        <img id="fullscreenImg" src="" />
    </div>

    <script>
        const githubPagesUrl = "https://yehlc.github.io/Tonsin/"; 
        const defaultImg = "98_1F.jpg"; 

        const floorPlanDB = {
            "98工地": {
                "全區配置圖": "98_siteplan.jpg", "戶外周邊": defaultImg, "屋頂外觀": defaultImg, "地工階段": defaultImg,
                "B1F": defaultImg, "B2F": defaultImg, "B3F": defaultImg, "B4F": defaultImg,
                "1F": "98_1F.jpg", "2F": defaultImg, "3F": defaultImg, "4F": defaultImg, "5F": defaultImg, 
                "6F": defaultImg, "7F": defaultImg, "8F": defaultImg, "9F": defaultImg, "10F": defaultImg,
                "11F": defaultImg, "12F": defaultImg, "13F": defaultImg, "14F": defaultImg, "15F": defaultImg, 
                "16F": defaultImg, "17F": defaultImg, "18F": defaultImg, "19F": defaultImg, "20F": defaultImg,
                "R1F": defaultImg, "R2F": defaultImg, "R3F": defaultImg, "PRF": defaultImg
            },
            "99工地": { "全區配置圖": defaultImg, "1F": defaultImg, "2F": defaultImg },
            "95工地": {
                "全區配置圖": "95_1F.png", "戶外周邊": "95_1F.png", "CBF": "95_CBF.png" ,
                "B1F": "95_B1F.png", "B2F": "95_B2F.png", "B3F": "95_B3F.png", "B4F": defaultImg,
                "1F": "95_1F.png", "2F": "95_2F.png", "3F": "95_3F.png", "4F": "95_4F.png", "5F": "95_5F.png", 
                "6F": "95_6F.png", "7F": "95_7F.png", "R1F": "95_R1F.png", "R2F": "95_R2F.png", "R3F": "95_R3F.png"
            },
            "鼎隆大苑": { "全區配置圖": defaultImg, "1F": "98_1F.jpg", "2F": defaultImg },
            "毅聯R8": { "全區配置圖": defaultImg, "1F": "98_1F.jpg", "2F": defaultImg },
            "毅聯寧夏": { "全區配置圖": defaultImg, "1F": "98_1F.jpg", "2F": defaultImg },
            "內湖江南": { "全區配置圖": defaultImg, "1F": "98_1F.jpg", "2F": defaultImg },
            "內湖富樂群": { "全區配置圖": defaultImg, "1F": "98_1F.jpg", "2F": defaultImg },
            "中壢映象": { "全區配置圖": defaultImg, "1F": "98_1F.jpg", "2F": defaultImg },
            "測試工地": { "全區配置圖": defaultImg, "1F": "test.jpg", "2F": defaultImg }
        };

        const canvas = document.getElementById('floorPlan');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = "Anonymous";
        
        let selectedX = 0, selectedY = 0;
        let isSelected = false;
        let defectsList = [];

        function drawSinglePin(px, py, color) {
            ctx.beginPath();
            ctx.arc(px, py, Math.max(canvas.width * 0.004, 3), 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#fff';
            ctx.stroke();
        }

        function drawAllPins() {
            defectsList.forEach(d => {
                let match = d.XY_Coord.match(/X:(\d+)%,\s*Y:(\d+)%/);
                if (match) {
                    d.px = (parseInt(match[1]) / 100) * canvas.width;
                    d.py = (parseInt(match[2]) / 100) * canvas.height;
                    let color = '#dc3545'; // 紅色
                    if (d.Status.includes('待驗收')) color = '#007bff'; // 藍色
                    if (d.Status.includes('已改善')) color = '#1DB446'; // 綠色
                    drawSinglePin(d.px, d.py, color);
                }
            });
        }

        // ★ 新增：關閉全螢幕的方法
        function closeFullscreen() {
            document.getElementById('fullscreenModal').style.display = 'none';
        }

        const myLiffId = "2009287087-4LSCRAq4"; 
        liff.init({ liffId: myLiffId }).then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const site = decodeURIComponent(urlParams.get('site') || "").trim(); 
            const floor = decodeURIComponent(urlParams.get('floor') || "").trim().toUpperCase(); 
            const viewX = urlParams.get('x');
            const viewY = urlParams.get('y');
            const mode = urlParams.get('mode');
            const apiBaseUrl = urlParams.get('api');

            if (site && floor) {
                document.getElementById('pageTitle').innerText = `${site} - ${floor} 平面圖`;
                document.getElementById('hintText').innerText = "請在下方平面圖「雙指放大」並「點擊」位置";
            } else {
                document.getElementById('pageTitle').innerText = "未指定案場與樓層";
                document.getElementById('hintText').innerText = "無法載入參數，請重新操作";
            }

            let targetImgUrl = 'https://via.placeholder.com/800x600.png?text=No+Floor+Plan+Found';
            if (floorPlanDB[site] && floorPlanDB[site][floor]) {
                targetImgUrl = githubPagesUrl + floorPlanDB[site][floor];
            }
            
            img.src = targetImgUrl;

            img.onload = () => {
                canvas.width = img.width;   
                canvas.height = img.height; 
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                if (mode === 'view' && viewX && viewY) {
                    document.getElementById('hintText').innerText = "📍 缺失發生位置 (可雙指放大查看細節)";
                    drawSinglePin((parseInt(viewX)/100)*canvas.width, (parseInt(viewY)/100)*canvas.height, 'red');
                } 
                else if (mode === 'overview' && apiBaseUrl) {
                    document.getElementById('hintText').innerText = "🔄 載入缺失資料中...";
                    fetch(`${apiBaseUrl}/defects-overview?site=${encodeURIComponent(site)}&floor=${encodeURIComponent(floor)}`, {
                        headers: { "ngrok-skip-browser-warning": "true" }
                    })
                    .then(res => res.json())
                    .then(json => {
                        if (json.success && json.data.length > 0) {
                            defectsList = json.data;
                            document.getElementById('hintText').innerText = `📍 圖紙總覽 (共 ${defectsList.length} 筆) - 點擊大頭針查看`;
                            drawAllPins();
                        } else {
                            document.getElementById('hintText').innerText = "✅ 本樓層目前無缺失紀錄";
                        }
                    })
                    .catch(err => { document.getElementById('hintText').innerText = "❌ 資料載入失敗"; });
                }
            };

            img.onerror = () => {
                ctx.font = "20px Arial";
                ctx.fillText("找不到平面圖檔", 50, 50);
                console.error("嘗試載入圖片失敗:", targetImgUrl);
            };

            canvas.addEventListener('click', function(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;    
                const scaleY = canvas.height / rect.height;  
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const clickX = (clientX - rect.left) * scaleX;
                const clickY = (clientY - rect.top) * scaleY;

                if (mode === 'overview') {
                    let clickedDefect = null;
                    let threshold = Math.max(canvas.width * 0.03, 20); 
                    
                    for (let d of defectsList) {
                        if (d.px && d.py) {
                            let dist = Math.sqrt(Math.pow(clickX - d.px, 2) + Math.pow(clickY - d.py, 2));
                            if (dist <= threshold) {
                                clickedDefect = d;
                                break;
                            }
                        }
                    }

                    if (clickedDefect) {
                        let cCard = document.getElementById('defectInfoCard');
                        let color = '#dc3545';
                        if (clickedDefect.Status.includes('待驗收')) color = '#007bff';
                        if (clickedDefect.Status.includes('已改善')) color = '#1DB446';

                        cCard.style.borderLeftColor = color;
                        document.getElementById('infoStatus').innerText = "狀態：" + clickedDefect.Status;
                        document.getElementById('infoStatus').style.color = color;
                        
                        document.getElementById('infoDeptUser').innerText = `👷‍♂️ ${clickedDefect.Dept} | 回報：${clickedDefect.UserName}`;
                        document.getElementById('infoDesc').innerText = clickedDefect.Description || "無備註說明";
                        
                        let realImgUrl = apiBaseUrl + clickedDefect.DisplayImageUrl;
                        document.getElementById('infoImg').style.display = 'none';
                        document.getElementById('imgZoomHint').style.display = 'none';
                        document.getElementById('imgLoading').style.display = 'block';
                        document.getElementById('imgLoading').innerHTML = '<div class="loader"></div> 圖片載入中...';
                        
                        fetch(realImgUrl, { headers: { "ngrok-skip-browser-warning": "true" } })
                        .then(response => {
                            if(response.ok) return response.blob();
                            throw new Error('Network response was not ok.');
                        })
                        .then(blob => {
                            let objectURL = URL.createObjectURL(blob);
                            let imgEle = document.getElementById('infoImg');
                            imgEle.src = objectURL;
                            
                            // ★ 綁定全螢幕點擊事件
                            imgEle.onclick = function() {
                                document.getElementById('fullscreenImg').src = objectURL;
                                document.getElementById('fullscreenModal').style.display = 'flex';
                            };

                            document.getElementById('imgLoading').style.display = 'none';
                            imgEle.style.display = 'block';
                            document.getElementById('imgZoomHint').style.display = 'block';
                        })
                        .catch(error => {
                            document.getElementById('imgLoading').innerHTML = "⚠️ 無法載入照片 (可能已移除或無權限)";
                        });

                        cCard.style.display = 'block';
                    } else {
                        document.getElementById('defectInfoCard').style.display = 'none';
                    }
                    return; 
                }

                if (mode === 'view') return; 

                selectedX = clickX;
                selectedY = clickY;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                drawSinglePin(selectedX, selectedY, 'red');

                isSelected = true;
                document.getElementById('sendBtn').style.display = 'block';
            });

        }).catch(err => {
            console.error(err);
            document.getElementById('pageTitle').innerText = "LIFF 初始化失敗";
        });

        function sendCoordinate() {
            if (!isSelected) return;
            const percentX = Math.round((selectedX / canvas.width) * 100);
            const percentY = Math.round((selectedY / canvas.height) * 100);
            const coordText = `[座標] X:${percentX}%, Y:${percentY}%`;

            if (liff.isInClient()) {
                liff.sendMessages([{ 'type': 'text', 'text': coordText }])
                .then(() => liff.closeWindow())
                .catch(err => alert('發送失敗: ' + err));
            } else {
                alert(`測試模式送出：${coordText}`);
            }
        }
    </script>
</body>
</html>
