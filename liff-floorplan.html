<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>平面圖定位</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { margin: 0; padding: 0; text-align: center; background: #f0f0f0; font-family: sans-serif; }
        .header { background: #007bff; color: white; padding: 12px; font-size: 18px; font-weight: bold; }
        .hint { padding: 10px; font-size: 14px; color: #555; }
        #canvas-container { position: relative; display: inline-block; margin-top: 5px; max-width: 100%; overflow: auto; }
        canvas { border: 2px solid #ccc; max-width: 100%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: #fff; touch-action: none; }
        #sendBtn { 
            display: none; margin: 15px auto; padding: 12px 24px; font-size: 18px; font-weight: bold;
            background: #1DB446; color: white; border: none; border-radius: 8px; width: 80%; 
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #sendBtn:active { background: #179038; }
    </style>
</head>
<body>
    <div class="header" id="pageTitle">平面圖載入中...</div>
    <div class="hint">請在下方平面圖「點擊」發生缺失的位置</div>
    
    <div id="canvas-container">
        <canvas id="floorPlan"></canvas>
    </div>
    
    <button id="sendBtn" onclick="sendCoordinate()">📍 送出標記座標</button>

    <script>
        // ==========================================
        // 1. 建立「圖庫對應表」(使用你的 GitHub Pages 網址)
        // ==========================================
        const githubPagesUrl = "https://yehlc.github.io/Tonsin/"; // 你的 GitHub Pages 根目錄
        
        const floorPlanDB = {
            "98工地": {
                // 換回這個寫法，手機版 LINE 才能完美相容
                "1F": githubPagesUrl + "98_1F.jpg", 
                "全區配置圖": githubPagesUrl + "98_siteplan.jpg"
            }
        };

        // ==========================================
        // 2. 解析網址參數 (?site=98工地&floor=1F)
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const site = urlParams.get('site');
        const floor = urlParams.get('floor');

        // 更新網頁標題
        if (site && floor) {
            document.getElementById('pageTitle').innerText = `${site} - ${floor} 平面圖`;
        } else {
            document.getElementById('pageTitle').innerText = "未指定案場與樓層，載入預設圖";
        }

        // ==========================================
        // 3. 尋找圖片並載入 Canvas
        // ==========================================
        const canvas = document.getElementById('floorPlan');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        // 處理跨域問題 (重要：必須加這行，否則 Canvas 無法讀取 GitHub 的圖片)
        img.crossOrigin = "Anonymous";

        let selectedX = 0, selectedY = 0;
        let isSelected = false;

        // 判斷是否有對應的圖片，沒有就給一張「找不到圖片」的預設圖
        let targetImgUrl = 'https://via.placeholder.com/800x600.png?text=No+Floor+Plan+Found';
        if (site && floor && floorPlanDB[site] && floorPlanDB[site][floor]) {
            targetImgUrl = floorPlanDB[site][floor];
        }
        
        img.src = targetImgUrl;

        img.onload = () => {
            // 讓圖片適應手機寬度
            const maxWidth = window.innerWidth * 0.95;
            const scale = maxWidth / img.width;
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };

        img.onerror = () => {
            alert("圖片載入失敗，請檢查 GitHub 儲存庫是否已設為 Public，且檔案名稱大小寫是否完全正確。");
        };

        // ==========================================
        // 4. 點擊圖片畫圖與回傳 LINE
        // ==========================================
        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            // 支援手機觸控或滑鼠點擊
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            selectedX = clientX - rect.left;
            selectedY = clientY - rect.top;
            
            // 重新繪製底圖以清除舊標記
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            // 畫紅色大頭針/標記
            ctx.beginPath();
            ctx.arc(selectedX, selectedY, Math.max(canvas.width * 0.02, 6), 0, 2 * Math.PI); // 根據螢幕大小自適應圓點
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            isSelected = true;
            document.getElementById('sendBtn').style.display = 'block';
        });

        // ==========================================
        // 5. 初始化 LIFF
        // ==========================================
        // ⚠️ 請務必將這裡替換成你在 LINE Developers 後台建立的真實 LIFF ID
        const myLiffId = "2009287087-4LSCRAq4"; 
        
        liff.init({ liffId: myLiffId }).catch(err => {
            console.error(err);
            document.getElementById('pageTitle').innerText = "LIFF 初始化失敗";
        });

        function sendCoordinate() {
            if (!isSelected) return;
            
            // 計算百分比座標 (X: 45%, Y: 60%)
            const percentX = Math.round((selectedX / canvas.width) * 100);
            const percentY = Math.round((selectedY / canvas.height) * 100);
            const coordText = `[座標] X:${percentX}%, Y:${percentY}%`;

            if (liff.isInClient()) {
                // 在 LINE 裡面：發送訊息並關閉視窗
                liff.sendMessages([{ 'type': 'text', 'text': coordText }])
                .then(() => liff.closeWindow())
                .catch(err => alert('發送失敗: ' + err));
            } else {
                // 在一般電腦瀏覽器測試時：跳出提示
                alert(`非 LINE 環境測試成功！\n系統準備傳送文字：${coordText}`);
            }
        }
    </script>
</body>
</html>
