        const floorPlanDB = {
            "98工地": {
                "1F": img_98_1F,
                // "全區配置圖": "data:image/jpeg;base64,另一張圖的字串..."
            }
        };

        // ==========================================
        // 2. 解析網址參數 (?site=98工地&floor=1F)
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        
        // 【關鍵修改】加入 decodeURIComponent 強制解碼，並處理可能的 null
        let rawSite = urlParams.get('site');
        let rawFloor = urlParams.get('floor');
        
        const site = rawSite ? decodeURIComponent(rawSite) : null;
        const floor = rawFloor ? decodeURIComponent(rawFloor) : null;

        console.log("解析出的工地:", site, "樓層:", floor); // 可以在 F12 開發者工具查看

        // ==========================================
        // 3. 尋找圖片並載入 Canvas
        // ==========================================
        const canvas = document.getElementById('floorPlan');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        // 🚨 刪除這行，因為 Base64 就在網頁裡，沒有跨域問題
        // img.crossOrigin = "Anonymous"; 

        let selectedX = 0, selectedY = 0;
        let isSelected = false;

        let targetImgUrl = 'https://via.placeholder.com/800x600.png?text=No+Floor+Plan+Found';
        if (site && floor && floorPlanDB[site] && floorPlanDB[site][floor]) {
            targetImgUrl = floorPlanDB[site][floor];
        }
        
        img.src = targetImgUrl;

        img.onload = () => {
            const maxWidth = window.innerWidth * 0.95;
            const scale = maxWidth / img.width;
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };

        // ==========================================
        // 4. 點擊圖片畫圖與回傳 LINE
        // ==========================================
        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            selectedX = clientX - rect.left;
            selectedY = clientY - rect.top;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.arc(selectedX, selectedY, Math.max(canvas.width * 0.02, 6), 0, 2 * Math.PI); 
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            isSelected = true;
            document.getElementById('sendBtn').style.display = 'block';
        });

        // ==========================================
        // 5. 初始化 LIFF
        // ==========================================
        const myLiffId = "2009287087-4LSCRAq4"; 
        
        liff.init({ liffId: myLiffId }).catch(err => {
            console.error(err);
            document.getElementById('pageTitle').innerText = "LIFF 初始化失敗";
        });

        function sendCoordinate() {
            if (!isSelected) return;
            
            const percentX = Math.round((selectedX / canvas.width) * 100);
            const percentY = Math.round((selectedY / canvas.height) * 100);
            const coordText = `[座標] X:${percentX}%, Y:${percentY}%`;

            if (liff.isInClient()) {
                liff.sendMessages([{ 'type': 'text', 'text': coordText }])
                .then(() => liff.closeWindow())
                .catch(err => alert('發送失敗: ' + err));
            } else {
                alert(`非 LINE 環境測試成功！\n系統準備傳送文字：${coordText}`);
            }
        }
    </script>
