<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統載入中...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f0f0; font-family: sans-serif; }
        .loader { border: 5px solid #ccc; border-top: 5px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 15px;"></div>
        <div style="color: #555; font-weight: bold;">系統路由跳轉中...</div>
    </div>

    <script>
        const myLiffId = "2009287087-4LSCRAq4"; // 你的 LIFF ID

        // ★ 正確做法：讓 LIFF 先初始化。初始化過程中它會自動把 liff.state 轉換為正常的網址參數
        liff.init({ liffId: myLiffId }).then(() => {
            
            // 此時的 window.location.search 已經被 LIFF 淨化過了 (例如變成 ?page=task&site=測試工地)
            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            const targetPage = urlParams.get('page');

            // 稍微延遲確保內部狀態寫入完成，然後跳轉
            setTimeout(() => {
                if (targetPage === 'task') {
                    window.location.replace("liff-task.html" + queryString);
                } else if (targetPage === 'inspection') {
                    // ★ 新增這行：跳轉到專屬的驗屋頁面
                    window.location.replace("liff-inspection.html" + queryString);
                } else {
                    window.location.replace("liff-floorplan.html" + queryString);
                }
            }, 150);

        }).catch((err) => {
            console.error("LIFF Init Error", err);
            // 發生錯誤時的備用跳轉
            window.location.replace("liff-floorplan.html" + window.location.search);
        });
    </script>
</body>
</html>
