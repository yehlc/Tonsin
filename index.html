<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統載入中...</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f0f0; font-family: sans-serif; }
        .loader { border: 5px solid #ccc; border-top: 5px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 15px;"></div>
        <div style="color: #555; font-weight: bold;">系統路由跳轉中...</div>
    </div>

    <script>
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        
        let targetPage = urlParams.get('page');
        let realQueryString = queryString; // 預設使用原本的 query

        // ★ 核心修復：解析 LINE LIFF 封裝的 liff.state 參數
        if (!targetPage) {
            let liffState = urlParams.get('liff.state');
            if (liffState) {
                // liffState 已經是被 URLSearchParams 解碼過的字串，例如 "/?page=task&site=測試工地"
                if (liffState.indexOf('?') > -1) {
                    realQueryString = liffState.substring(liffState.indexOf('?'));
                } else {
                    realQueryString = liffState.startsWith('?') ? liffState : '?' + liffState;
                }
                let stateParams = new URLSearchParams(realQueryString);
                targetPage = stateParams.get('page');
            }
        }

        // 交通警察邏輯：
        setTimeout(() => {
            if (targetPage === 'task') {
                // 如果參數有標明是要去任務頁面
                window.location.replace("liff-task.html" + realQueryString);
            } else {
                // 預設（包含舊版的表單、圖紙）統統導向 floorplan
                window.location.replace("liff-floorplan.html" + realQueryString);
            }
        }, 100); // 稍微延遲確保轉址順暢
    </script>
</body>
</html>
