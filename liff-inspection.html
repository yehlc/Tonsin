<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>驗屋系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 0; overflow-x: hidden; touch-action: manipulation; }
        .header { background: #8e44ad; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .title-box { text-align: center; }
        .main-title { font-size: 18px; font-weight: bold; }
        .sub-title { font-size: 12px; opacity: 0.8; }
        
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 56px; z-index: 99;}
        .tab { flex: 1; text-align: center; padding: 12px 5px; font-weight: bold; font-size: 14px; color: #555; cursor: pointer; }
        .tab.active { color: #8e44ad; border-bottom: 3px solid #8e44ad; }
        
        .toolbar { padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        select { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ced4da; border-radius: 6px; background: #f8f9fa; font-weight: bold; }
        
        .swipe-area { width: 100%; }

        /* 圖紙區域 */
        .map-container { position: relative; width: 100%; display: flex; justify-content: center; overflow: auto; background: #ccc; border-bottom: 3px solid #8e44ad; }
        #floorPlan { width: 100%; height: auto; background: #fff; cursor: crosshair; display: block; }
        .hint-bar { position: absolute; top: 0; left: 0; right: 0; background: rgba(255,234,167,0.9); color: #d63031; text-align: center; padding: 10px 0; font-size: 14px; font-weight: bold; z-index: 10; pointer-events: none; }
        
        /* 表單區域 */
        #addSection { padding: 15px; background: white; display: block; }
        .form-container { width: 100%; }
        .form-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .form-header h3 { margin: 0; color: #2d3436; font-size: 16px; }
        .btn-reset-form { background: #eee; color: #555; border: none; padding: 5px 10px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2d3436; font-size: 14px; }
        textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; height: 80px; resize: vertical; }
        
        .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;}
        .q-tag { background: #f0f0f0; color: #8e44ad; border: 1px solid #8e44ad; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s;}
        .q-tag:active { background: #8e44ad; color: white; }

        .camera-btn { display: block; width: 100%; padding: 12px; background: #fff; border: 2px dashed #8e44ad; color: #8e44ad; font-weight: bold; border-radius: 6px; text-align: center; position: relative; margin-bottom: 10px;}
        .camera-input { position: absolute; top: 0; left: 0; opacity: 0; width: 100%; height: 100%; }
        #previewImg { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; display: none; margin-bottom: 10px; border: 1px solid #ddd; }

        .btn-submit { width: 100%; padding: 15px; background: #1DB446; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; margin-bottom: 20px; }
        .btn-export { width: 100%; padding: 15px; background: #007bff; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; margin-top: 15px; }
        
        #mapSection { display: none; }
        #overviewSection { display: none; padding: 15px; }
        
        .defect-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 10px; }
        .defect-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; background: #eee; }
        .defect-info { flex: 1; }
        .defect-tag { display: inline-block; background: #ffeaa7; color: #d63031; font-size: 12px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 4px; }
        
        .toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold;}
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div class="header">
        <button class="nav-btn" onclick="changeRoom(-1)">◀ 上一戶</button>
        <div class="title-box">
            <div class="main-title" id="roomTitle">A1戶</div>
            <div class="sub-title" id="siteFloorTitle">載入中...</div>
        </div>
        <button class="nav-btn" onclick="changeRoom(1)">下一戶 ▶</button>
    </div>

    <div class="tabs">
        <div class="tab active" id="tabAdd" onclick="switchTab('add')">✍️ 新增缺失</div>
        <div class="tab" id="tabMap" onclick="switchTab('map')">🗺️ 缺失總覽</div>
        <div class="tab" id="tabOverview" onclick="switchTab('overview')">📋 清單總覽</div>
    </div>

    <div class="swipe-area" id="swipeArea">
        
        <div id="addSection">
            <div class="form-container">
                <div class="form-header">
                    <h3 id="formTitle">✍️ 填寫缺失資訊</h3>
                    <button class="btn-reset-form" onclick="enterAddMode()">🔄 清空重填</button>
                </div>
                <input type="hidden" id="editDefectId" value="">

                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="btn-submit" id="submitBtn" onclick="submitInspection()" style="flex:2; margin-bottom:0;">📤 儲存此筆缺失</button>
                    <button id="deleteBtn" onclick="deleteInspection()" style="flex:1; background:#d63031; color:white; font-size:16px; font-weight:bold; border:none; border-radius:8px; display:none;">🗑️ 刪除</button>
                </div>

                <div class="form-group">
                    <label>📂 關聯圖面 (立體缺失可選「無」)</label>
                    <select id="formDrawingType">
                        <option value="無">無 (不標記於平面圖)</option>
                        <option value="1.建築客變圖">1. 建築客變圖</option>
                        <option value="2.電氣端點設備圖">2. 電氣端點設備圖</option>
                        <option value="3.排水端點設備圖">3. 排水端點設備圖</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📍 缺失所在空間</label>
                    <select id="locationSelect">
                        <option value="客餐廳">客餐廳</option>
                        <option value="主臥室">主臥室</option>
                        <option value="次臥(一)">次臥(一)</option>
                        <option value="次臥(二)">次臥(二)</option>
                        <option value="廚房">廚房</option>
                        <option value="主衛浴">主衛浴</option>
                        <option value="客衛浴">客衛浴</option>
                        <option value="陽台">陽台</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <div class="camera-btn">
                        📸 點擊拍攝缺失照片
                        <input type="file" id="photoInput" accept="image/*" capture="environment" class="camera-input" onchange="previewPhoto(this)">
                    </div>
                    <img id="previewImg" src="">
                </div>
                
                <div class="form-group">
                    <label>📝 缺失說明</label>
                    <div class="quick-tags">
                        <span class="q-tag" onclick="appendDesc('牆面髒污未清潔')">牆面髒污</span>
                        <span class="q-tag" onclick="appendDesc('油漆剝落/裂縫')">油漆裂縫</span>
                        <span class="q-tag" onclick="appendDesc('地磚空鼓/破損')">地磚空鼓</span>
                        <span class="q-tag" onclick="appendDesc('插座無電/位置錯誤')">插座異常</span>
                        <span class="q-tag" onclick="appendDesc('排水孔阻塞/不通')">排水阻塞</span>
                        <span class="q-tag" onclick="appendDesc('門窗開關不順/刮傷')">門窗異常</span>
                    </div>
                    <textarea id="descriptionInput" placeholder="可點擊上方快速標籤，或手動輸入說明..."></textarea>
                </div>
                <button class="btn-submit" onclick="submitInspection()">📤 儲存此筆缺失</button>
            </div>
        </div>

        <div id="mapSection">
            <div class="toolbar">
                <select id="drawingType" onchange="updateDrawingImage()">
                    <option value="1.建築客變圖">1. 建築客變圖</option>
                    <option value="2.電氣端點設備圖">2. 電氣端點設備圖</option>
                    <option value="3.排水端點設備圖">3. 排水端點設備圖</option>
                </select>
            </div>
            
            <div class="map-container" id="canvas-container">
                <div class="hint-bar" id="mapHint">📍 點選空白處新增標記，或點選圖釘編輯</div>
                <canvas id="floorPlan"></canvas>
            </div>
        </div>

        <div id="overviewSection">
            <h3 style="color:#2d3436; margin-top:0;">📋 本戶缺失清單</h3>
            <div id="defectList">載入中...</div>
            <button class="btn-export" onclick="exportExcel()">📥 匯出驗屋修繕單 (Excel)</button>
        </div>

    </div>

    <div id="toastMsg" class="toast">✅ 缺失新增成功！</div>

    <script>
        const myLiffId = "2009287087-4LSCRAq4";
        let apiBaseUrl = "";
        let currentSite = "";
        let currentFloor = "";
        let currentRoom = "";
        let currentUser = "";
        
        const ROOM_CONFIG = {
            "鼎隆大苑": {
                "2F": ["A1戶", "A2戶", "A3戶", "B1戶", "B2戶", "B3戶"],
                "3F": ["A1戶", "A2戶", "A3戶", "B1戶", "B2戶", "B3戶"]
            }
        };
        
        let flatRoomList = [];
        let currentFlatIndex = 0;

        let floorCanvas, floorCtx, floorImg;
        let selectedX = 0, selectedY = 0;
        let isSelected = false;

        let globalRoomDefects = []; 
        
        liff.init({ liffId: myLiffId }).then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            currentSite = decodeURIComponent(urlParams.get('site') || "");
            currentFloor = decodeURIComponent(urlParams.get('floor') || "");
            currentUser = decodeURIComponent(urlParams.get('user') || "未知");
            apiBaseUrl = decodeURIComponent(urlParams.get('api') || "https://unpregnant-tonically-caitlyn.ngrok-free.dev");
            let initialRoom = decodeURIComponent(urlParams.get('room') || "A1戶");

            buildFlatRoomList(initialRoom);
            initCanvas();
            updateUI(); 
        });

        // ====== UI 切換與 Tab 邏輯 ======
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('addSection').style.display = 'none';
            document.getElementById('mapSection').style.display = 'none';
            document.getElementById('overviewSection').style.display = 'none';

            if (tab === 'add') {
                document.getElementById('tabAdd').classList.add('active');
                document.getElementById('addSection').style.display = 'block';
            } else if (tab === 'map') {
                document.getElementById('tabMap').classList.add('active');
                document.getElementById('mapSection').style.display = 'block';
                renderCanvas(); // 切換過來時重繪圖紙以防變形
            } else {
                document.getElementById('tabOverview').classList.add('active');
                document.getElementById('overviewSection').style.display = 'block';
            }
        }

        // 如果在新增表單把圖紙類型改回「無」，清除座標綁定
        document.getElementById('formDrawingType').addEventListener('change', function() {
            if (this.value === '無') {
                isSelected = false;
            }
        });

        // ====== 1. 跨樓層戶別跳轉邏輯 ======
        function buildFlatRoomList(initialRoom) {
            flatRoomList = [];
            if (ROOM_CONFIG[currentSite]) {
                let floors = Object.keys(ROOM_CONFIG[currentSite]);
                for (let f of floors) {
                    for (let r of ROOM_CONFIG[currentSite][f]) {
                        flatRoomList.push({ floor: f, room: r });
                    }
                }
            } else {
                flatRoomList.push({ floor: currentFloor, room: "A1戶" }); 
            }

            currentFlatIndex = flatRoomList.findIndex(item => item.floor === currentFloor && item.room === initialRoom);
            if (currentFlatIndex === -1) currentFlatIndex = 0;
            currentFloor = flatRoomList[currentFlatIndex].floor;
            currentRoom = flatRoomList[currentFlatIndex].room;
        }

        function changeRoom(direction) {
            currentFlatIndex += direction;
            if (currentFlatIndex < 0) currentFlatIndex = flatRoomList.length - 1;
            if (currentFlatIndex >= flatRoomList.length) currentFlatIndex = 0;
            
            currentFloor = flatRoomList[currentFlatIndex].floor;
            currentRoom = flatRoomList[currentFlatIndex].room;
            
            enterAddMode(); // 換戶別時重置表單狀態
            updateUI();
        }

        // ====== 2. 資料撈取與清單渲染 ======
        function loadRoomDefects() {
            let container = document.getElementById('defectList');
            container.innerHTML = "載入中...";
            fetch(`${apiBaseUrl}/room-defects?site=${encodeURIComponent(currentSite)}&floor=${encodeURIComponent(currentFloor)}&room=${encodeURIComponent(currentRoom)}`, {
                headers: { "ngrok-skip-browser-warning": "true" }
            }).then(r => r.json()).then(res => {
                if (res.success) {
                    globalRoomDefects = res.data;
                    renderCanvas(); 
                    
                    if (res.data.length > 0) {
                        let html = "";
                        res.data.forEach(d => {
                            html += `
                            <div class="defect-card" onclick="editDefect(${d.ID})" style="cursor:pointer; border-left:4px solid #8e44ad;">
                                <img src="${apiBaseUrl}${d.ImageUrl}?ngrok-skip-browser-warning=true" alt="照片">
                                <div class="defect-info">
                                    <span class="defect-tag">${d.Location}</span>
                                    <div style="font-size:14px; font-weight:bold; margin-bottom:5px;">${d.Description}</div>
                                    <div style="font-size:12px; color:#888;">${d.DrawingType || '未標記圖紙'}</div>
                                </div>
                            </div>`;
                        });
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = "<div style='text-align:center; padding:20px; color:#888;'>✅ 本戶目前無缺失</div>";
                    }
                }
            });
        }

        // ====== 3. 畫布互動與標記 ======
        function initCanvas() {
            floorCanvas = document.getElementById('floorPlan');
            floorCtx = floorCanvas.getContext('2d');
            floorImg = new Image();
            floorImg.crossOrigin = "Anonymous";

            floorCanvas.addEventListener('click', function(e) {
                const rect = floorCanvas.getBoundingClientRect();
                const scaleX = floorCanvas.width / rect.width; 
                const scaleY = floorCanvas.height / rect.height;  
                let clickX = (e.offsetX !== undefined) ? e.offsetX * scaleX : (e.clientX - rect.left) * scaleX;
                let clickY = (e.offsetY !== undefined) ? e.offsetY * scaleY : (e.clientY - rect.top) * scaleY;

                let clickedExisting = null;
                let threshold = Math.max(floorCanvas.width * 0.04, 30); 
                let currentDrawing = document.getElementById('drawingType').value;
                for (let d of globalRoomDefects) {
                    if (d.DrawingType === currentDrawing && d.px && d.py) {
                        if (Math.hypot(clickX - d.px, clickY - d.py) <= threshold) {
                            clickedExisting = d;
                            break;
                        }
                    }
                }

                if (clickedExisting) {
                    editDefect(clickedExisting.ID);
                } else {
                    // 點擊空白處新增 -> 帶入座標並跳轉去 Tab 1 表單填寫
                    enterAddMode();
                    selectedX = clickX; 
                    selectedY = clickY;
                    isSelected = true;
                    
                    // 自動選擇對應的圖紙分類
                    document.getElementById('formDrawingType').value = currentDrawing;
                    document.getElementById('formTitle').innerText = "📍 已鎖定圖紙座標，請填寫資訊";
                    
                    switchTab('add');
                    setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, 100);
                }
            });
        }

        function renderCanvas() {
            if(!floorImg.complete || !floorImg.src) return;
            floorCtx.clearRect(0, 0, floorCanvas.width, floorCanvas.height);
            floorCtx.drawImage(floorImg, 0, 0, floorCanvas.width, floorCanvas.height);
            
            let currentDrawing = document.getElementById('drawingType').value;
            globalRoomDefects.forEach(d => {
                if (d.DrawingType === currentDrawing && d.XY_Coord) {
                    let match = d.XY_Coord.match(/X:(\d+)%,\s*Y:(\d+)%/);
                    if (match) {
                        let px = (parseInt(match[1]) / 100) * floorCanvas.width;
                        let py = (parseInt(match[2]) / 100) * floorCanvas.height;
                        drawExistingPin(px, py, d.ID);
                        d.px = px; d.py = py; 
                    }
                }
            });
        }

        function drawExistingPin(px, py, id) {
            let size = Math.max(floorCanvas.width * 0.008, 6); 
            floorCtx.lineWidth = 3; floorCtx.strokeStyle = '#fff';
            floorCtx.beginPath(); floorCtx.moveTo(px, py); 
            floorCtx.lineTo(px - size, py - size * 2); floorCtx.lineTo(px + size, py - size * 2); 
            floorCtx.closePath(); floorCtx.fillStyle = '#007bff'; floorCtx.fill(); floorCtx.stroke();
            
            floorCtx.beginPath(); floorCtx.arc(px, py - size * 2, size, 0, Math.PI * 2);
            floorCtx.fillStyle = '#007bff'; floorCtx.fill(); floorCtx.stroke();

            floorCtx.fillStyle = '#111'; floorCtx.font = `bold ${size*1.8}px sans-serif`;
            floorCtx.fillText(id, px + size, py - size*2.5);
        }

        function updateDrawingImage() {
            let drawingType = document.getElementById('drawingType').value;
            const baseImgUrl = "https://yehlc.github.io/Tonsin/驗屋圖資"; 
            let targetImgSrc = `${baseImgUrl}/${encodeURIComponent(currentSite)}/${encodeURIComponent(currentFloor)}/${encodeURIComponent(currentRoom)}_${encodeURIComponent(drawingType)}.png`;

            floorImg.onload = () => {
                floorCanvas.width = floorImg.width; floorCanvas.height = floorImg.height; 
                renderCanvas(); 
            };
            floorImg.onerror = () => {
                floorImg.onload = () => { floorCanvas.width = floorImg.width; floorCanvas.height = floorImg.height; renderCanvas(); };
                floorImg.src = `https://via.placeholder.com/800x400/ffeaa7/d63031?text=No+Image`;
            };
            floorImg.src = targetImgSrc;
        }

        // ====== 4. 編輯與刪除邏輯 ======
        window.editDefect = function(id) {
            let d = globalRoomDefects.find(x => x.ID === id);
            if(!d) return;

            switchTab('add');

            document.getElementById('editDefectId').value = d.ID;
            document.getElementById('formTitle').innerText = `✏️ 編輯缺失 #${d.ID}`;
            document.querySelectorAll('#submitBtn').forEach(btn => btn.innerText = "🔄 更新此筆資料");
            document.getElementById('deleteBtn').style.display = "block";

            document.getElementById('locationSelect').value = d.Location || "客餐廳";
            document.getElementById('descriptionInput').value = d.Description || "";
            
            let dtSelect = document.getElementById('formDrawingType');
            if (d.DrawingType && Array.from(dtSelect.options).some(o => o.value === d.DrawingType)) {
                dtSelect.value = d.DrawingType;
            } else {
                dtSelect.value = "無";
            }
            
            let previewImg = document.getElementById('previewImg');
            previewImg.src = `${apiBaseUrl}${d.ImageUrl}?cb=${new Date().getTime()}&ngrok-skip-browser-warning=true`;
            previewImg.style.display = 'block';

            setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, 100);
        }

        window.enterAddMode = function() {
            document.getElementById('editDefectId').value = "";
            document.getElementById('formTitle').innerText = `✍️ 填寫缺失資訊`;
            document.querySelectorAll('#submitBtn').forEach(btn => btn.innerText = "📤 儲存此筆缺失");
            document.getElementById('deleteBtn').style.display = "none";

            document.getElementById('locationSelect').value = "客餐廳";
            document.getElementById('formDrawingType').value = "無";
            document.getElementById('descriptionInput').value = "";
            document.getElementById('photoInput').value = "";
            document.getElementById('previewImg').src = "";
            document.getElementById('previewImg').style.display = "none";

            selectedX = 0; selectedY = 0; isSelected = false; 
        }

        function appendDesc(text) {
            let input = document.getElementById('descriptionInput');
            if (input.value) { input.value += "，" + text; } else { input.value = text; }
        }

        function updateUI() {
            document.getElementById('roomTitle').innerText = currentRoom;
            document.getElementById('siteFloorTitle').innerText = `${currentSite} - ${currentFloor}`;
            updateDrawingImage();
            loadRoomDefects();
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('previewImg').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitInspection() {
            let editId = document.getElementById('editDefectId').value;
            let fileInput = document.getElementById('photoInput');
            let desc = document.getElementById('descriptionInput').value;
            
            if (!editId && (!fileInput.files || fileInput.files.length === 0)) return alert("⚠️ 請拍攝缺失照片！");
            if (!desc.trim()) return alert("⚠️ 請輸入或選擇缺失說明！");

            let btns = document.querySelectorAll('#submitBtn');
            btns.forEach(btn => { btn.disabled = true; btn.innerText = "⏳ 儲存中..."; });

            let base64Img = null;
            if (fileInput.files && fileInput.files.length > 0) {
                base64Img = await fileToBase64(fileInput.files[0]);
            }
            
            let url = editId ? `${apiBaseUrl}/update-inspection-defect` : `${apiBaseUrl}/submit-inspection`;
            
            let payload = {
                site: currentSite, floor: currentFloor, roomType: currentRoom,
                drawingType: document.getElementById('formDrawingType').value,
                location: document.getElementById('locationSelect').value,
                description: desc,
                imageBase64: base64Img, 
                inspector: currentUser
            };

            if (editId) {
                payload.id = editId; 
            } else {
                if (isSelected && payload.drawingType !== '無') {
                    let xPercent = Math.round((selectedX / floorCanvas.width) * 100);
                    let yPercent = Math.round((selectedY / floorCanvas.height) * 100);
                    payload.xyCoord = `[座標] X:${xPercent}%, Y:${yPercent}%`;
                } else {
                    payload.xyCoord = ""; 
                }
            }

            fetch(url, {
                method: "POST", headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(res => {
                if (res.success) { 
                    showToast(editId ? "✅ 缺失更新成功！" : "✅ 缺失新增成功！"); 
                    enterAddMode(); 
                    loadRoomDefects();  
                    switchTab('overview'); // 送出後跳轉至清單供確認
                } else { alert("❌ 操作失敗：" + res.error); }
            }).catch(e => alert("❌ 連線異常")).finally(() => {
                btns.forEach(btn => { btn.disabled = false; btn.innerText = editId ? "🔄 更新此筆資料" : "📤 儲存此筆缺失"; });
            });
        }

        window.deleteInspection = function() {
            let editId = document.getElementById('editDefectId').value;
            if(!editId) return;
            if(!confirm("確定要刪除此筆缺失嗎？(刪除後將不會出現在清單與匯出報表中)")) return;
            
            fetch(`${apiBaseUrl}/delete-inspection-defect`, {
                method: "POST", headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
                body: JSON.stringify({ id: editId })
            }).then(r => r.json()).then(res => {
                if (res.success) { 
                    showToast("🗑️ 缺失已刪除！"); 
                    enterAddMode();
                    loadRoomDefects(); 
                    switchTab('overview');
                } else { alert("❌ 刪除失敗：" + res.error); }
            }).catch(e => alert("❌ 連線異常"));
        }

        function exportExcel() {
            let url = `${apiBaseUrl}/export-inspection-excel?site=${encodeURIComponent(currentSite)}&floor=${encodeURIComponent(currentFloor)}&room=${encodeURIComponent(currentRoom)}`;
            window.open(url, '_blank');
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error);
            });
        }
        
        function showToast(msg) {
            var x = document.getElementById("toastMsg");
            if(msg) x.innerText = msg;
            x.className = "toast show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
