<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>驗屋系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 0; overflow-x: hidden; }
        .header { background: #8e44ad; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .title-box { text-align: center; }
        .main-title { font-size: 18px; font-weight: bold; }
        .sub-title { font-size: 12px; opacity: 0.8; }
        
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; text-align: center; padding: 12px; font-weight: bold; color: #555; cursor: pointer; }
        .tab.active { color: #8e44ad; border-bottom: 3px solid #8e44ad; }
        
        .toolbar { padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        select { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ced4da; border-radius: 6px; background: #f8f9fa; font-weight: bold; }
        
        .swipe-area { width: 100%; transition: transform 0.3s; }

        /* ★ 畫布與圖面容器 (加大了高度，支援手勢) */
        .map-container { width: 100%; height: 55vh; background: #ddd; position: relative; border-bottom: 3px solid #8e44ad; overflow: hidden; touch-action: none;}
        #floorPlan { width: 100%; height: 100%; object-fit: contain; cursor: crosshair; background: #fff; transform-origin: 0 0;}
        .hint-bar { position: absolute; top: 0; left: 0; width: 100%; background: rgba(255,234,167,0.9); color: #d63031; text-align: center; padding: 5px 0; font-size: 14px; font-weight: bold; z-index: 10;}
        
        .form-container { padding: 15px; background: white; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2d3436; font-size: 14px; }
        textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; height: 80px; resize: vertical; }
        
        .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;}
        .q-tag { background: #f0f0f0; color: #8e44ad; border: 1px solid #8e44ad; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s;}
        .q-tag:active { background: #8e44ad; color: white; }

        .camera-btn { display: block; width: 100%; padding: 12px; background: #fff; border: 2px dashed #8e44ad; color: #8e44ad; font-weight: bold; border-radius: 6px; text-align: center; position: relative; margin-bottom: 10px;}
        .camera-input { position: absolute; top: 0; left: 0; opacity: 0; width: 100%; height: 100%; }
        #previewImg { width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; display: none; margin-bottom: 10px; border: 1px solid #ddd; }

        .btn-submit { width: 100%; padding: 15px; background: #1DB446; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; margin-bottom: 20px; }
        .btn-export { width: 100%; padding: 15px; background: #007bff; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; margin-top: 15px; }
        
        #overviewSection { display: none; padding: 15px; }
        .defect-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 10px; }
        .defect-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; background: #eee; }
        .defect-info { flex: 1; }
        .defect-tag { display: inline-block; background: #ffeaa7; color: #d63031; font-size: 12px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 4px; }
        
        .toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold;}
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div class="header">
        <button class="nav-btn" onclick="changeRoom(-1)">◀ 上一戶</button>
        <div class="title-box">
            <div class="main-title" id="roomTitle">A1戶</div>
            <div class="sub-title" id="siteFloorTitle">載入中...</div>
        </div>
        <button class="nav-btn" onclick="changeRoom(1)">下一戶 ▶</button>
    </div>

    <div class="tabs">
        <div class="tab active" id="tabAdd" onclick="switchTab('add')">✍️ 新增缺失</div>
        <div class="tab" id="tabOverview" onclick="switchTab('overview')">📊 本戶總覽</div>
    </div>

    <div class="swipe-area" id="swipeArea">
        <div id="addSection">
            <div class="toolbar">
                <select id="drawingType" onchange="updateDrawingImage()">
                    <option value="1.建築客變圖">1. 建築客變圖</option>
                    <option value="2.電氣端點設備圖">2. 電氣端點設備圖</option>
                    <option value="3.排水端點設備圖">3. 排水端點設備圖</option>
                </select>
            </div>
            
            <div class="map-container" id="canvas-container">
                <div class="hint-bar" id="mapHint">📍 雙指可縮放圖面，點擊「標記缺失」</div>
                <canvas id="floorPlan"></canvas>
            </div>

            <div class="form-container">
                <div class="form-group">
                    <label>📍 缺失所在空間</label>
                    <select id="locationSelect">
                        <option value="客餐廳">客餐廳</option>
                        <option value="主臥室">主臥室</option>
                        <option value="次臥(一)">次臥(一)</option>
                        <option value="次臥(二)">次臥(二)</option>
                        <option value="廚房">廚房</option>
                        <option value="主衛浴">主衛浴</option>
                        <option value="客衛浴">客衛浴</option>
                        <option value="陽台">陽台</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <div class="camera-btn">
                        📸 點擊拍攝缺失照片
                        <input type="file" id="photoInput" accept="image/*" capture="environment" class="camera-input" onchange="previewPhoto(this)">
                    </div>
                    <img id="previewImg" src="">
                </div>
                
                <div class="form-group">
                    <label>📝 缺失說明</label>
                    <div class="quick-tags">
                        <span class="q-tag" onclick="appendDesc('牆面髒污未清潔')">牆面髒污</span>
                        <span class="q-tag" onclick="appendDesc('油漆剝落/裂縫')">油漆裂縫</span>
                        <span class="q-tag" onclick="appendDesc('地磚空鼓/破損')">地磚空鼓</span>
                        <span class="q-tag" onclick="appendDesc('插座無電/位置錯誤')">插座異常</span>
                        <span class="q-tag" onclick="appendDesc('排水孔阻塞/不通')">排水阻塞</span>
                        <span class="q-tag" onclick="appendDesc('門窗開關不順/刮傷')">門窗異常</span>
                    </div>
                    <textarea id="descriptionInput" placeholder="可點擊上方快速標籤，或手動輸入說明..."></textarea>
                </div>
                <button class="btn-submit" id="submitBtn" onclick="submitInspection()">📤 儲存此筆缺失</button>
            </div>
        </div>

        <div id="overviewSection">
            <h3 style="color:#2d3436; margin-top:0;">📋 本戶缺失清單</h3>
            <div id="defectList">載入中...</div>
            <button class="btn-export" onclick="exportExcel()">📥 匯出驗屋修繕單 (Excel)</button>
        </div>
    </div>

    <div id="toastMsg" class="toast">✅ 缺失新增成功！</div>

    <script>
        const myLiffId = "2009287087-4LSCRAq4";
        let apiBaseUrl = "";
        let currentSite = "";
        let currentFloor = "";
        let currentRoom = "A1戶";
        let currentUser = "";
        
        // 戶別設定表
        const ROOM_CONFIG = {
            "鼎隆大苑": {
                "2F": ["A1戶", "A2戶", "A3戶", "B1戶", "B2戶", "B3戶"],
                "3F": ["A1戶", "A2戶", "A3戶", "B1戶", "B2戶", "B3戶"]
            }
        };
        
        // ★ 扁平化陣列 (實現跨樓層切換)
        let flatRoomList = [];
        let currentFlatIndex = 0;

        // ★ Canvas 變數 (包含縮放)
        let floorCanvas, floorCtx, floorImg;
        let selectedX = 0, selectedY = 0, isSelected = false;
        let scale = 1, panX = 0, panY = 0;

        liff.init({ liffId: myLiffId }).then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            currentSite = decodeURIComponent(urlParams.get('site') || "");
            currentFloor = decodeURIComponent(urlParams.get('floor') || "");
            currentUser = decodeURIComponent(urlParams.get('user') || "未知");
            apiBaseUrl = decodeURIComponent(urlParams.get('api') || "https://unpregnant-tonically-caitlyn.ngrok-free.dev");

            buildFlatRoomList();
            
            let qRoom = decodeURIComponent(urlParams.get('room') || "");
            currentFlatIndex = flatRoomList.findIndex(item => item.floor === currentFloor && item.room === qRoom);
            if (currentFlatIndex === -1) currentFlatIndex = 0;
            
            currentFloor = flatRoomList[currentFlatIndex].floor;
            currentRoom = flatRoomList[currentFlatIndex].room;

            initCanvas();
            initPinchZoom();
            updateUI();
            initSwipe();
        });

        // ====== 跨樓層陣列邏輯 ======
        function buildFlatRoomList() {
            flatRoomList = [];
            if (!ROOM_CONFIG[currentSite]) {
                flatRoomList.push({ floor: currentFloor, room: "A1戶" });
                return;
            }
            for (let floor in ROOM_CONFIG[currentSite]) {
                let rooms = ROOM_CONFIG[currentSite][floor];
                for (let r of rooms) flatRoomList.push({ floor: floor, room: r });
            }
        }

        function changeRoom(direction) {
            if (flatRoomList.length === 0) return;
            currentFlatIndex += direction;
            if (currentFlatIndex < 0) currentFlatIndex = flatRoomList.length - 1;
            if (currentFlatIndex >= flatRoomList.length) currentFlatIndex = 0;
            
            currentFloor = flatRoomList[currentFlatIndex].floor;
            currentRoom = flatRoomList[currentFlatIndex].room;
            
            let sa = document.getElementById('swipeArea');
            sa.style.transform = direction > 0 ? "translateX(-20px)" : "translateX(20px)";
            sa.style.opacity = 0.5;
            setTimeout(() => { sa.style.transform = "translateX(0)"; sa.style.opacity = 1; }, 200);

            updateUI();
            if (document.getElementById('overviewSection').style.display === 'block') loadDefectsOverview();
        }

        function appendDesc(text) {
            let input = document.getElementById('descriptionInput');
            input.value = input.value ? input.value + "，" + text : text;
        }

        // ====== Canvas 圖面與標記邏輯 ======
        function initCanvas() {
            floorCanvas = document.getElementById('floorPlan');
            floorCtx = floorCanvas.getContext('2d');
            floorImg = new Image();
            floorImg.crossOrigin = "Anonymous";

            // 點擊新增圖釘 (精準計算縮放後的座標)
            floorCanvas.addEventListener('click', function(e) {
                const rect = floorCanvas.getBoundingClientRect();
                const scaleX = floorCanvas.width / rect.width; 
                const scaleY = floorCanvas.height / rect.height;  
                selectedX = (e.clientX - rect.left) * scaleX; 
                selectedY = (e.clientY - rect.top) * scaleY;

                isSelected = true;
                document.getElementById('mapHint').style.backgroundColor = "rgba(46, 204, 113, 0.9)";
                document.getElementById('mapHint').style.color = "#fff";
                document.getElementById('mapHint').innerText = "✅ 已標記位置 (可重新點擊修改)";

                floorCtx.clearRect(0, 0, floorCanvas.width, floorCanvas.height); 
                floorCtx.drawImage(floorImg, 0, 0, floorCanvas.width, floorCanvas.height);
                drawPin(selectedX, selectedY);
            });
        }

        // ★ 雙指縮放與單指拖曳 (Google Map 體驗)
        function initPinchZoom() {
            const container = document.getElementById('canvas-container');
            let startDistance = 0, startScale = 1;
            let isDragging = false, startX = 0, startY = 0, initialPanX = 0, initialPanY = 0;

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    startDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    startScale = scale;
                } else if (e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    initialPanX = panX;
                    initialPanY = panY;
                }
            }, {passive: false});

            container.addEventListener('touchmove', (e) => {
                e.preventDefault(); // 防止畫面跟著滾動
                if (e.touches.length === 2) {
                    const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    scale = Math.max(1, Math.min(startScale * (currentDistance / startDistance), 5)); // 限制 1x ~ 5x
                    updateCanvasTransform();
                } else if (e.touches.length === 1 && isDragging && scale > 1) {
                    panX = initialPanX + (e.touches[0].clientX - startX);
                    panY = initialPanY + (e.touches[0].clientY - startY);
                    updateCanvasTransform();
                }
            }, {passive: false});

            container.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) startDistance = 0;
                if (e.touches.length === 0) isDragging = false;
            });
        }

        function updateCanvasTransform() {
            if (scale === 1) { panX = 0; panY = 0; }
            floorCanvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        function drawPin(px, py) {
            let size = Math.max(floorCanvas.width * 0.01, 8); 
            floorCtx.lineWidth = 2; 
            floorCtx.strokeStyle = '#fff';
            floorCtx.beginPath(); 
            floorCtx.moveTo(px, py - size * 1.3); 
            floorCtx.lineTo(px + size * 1.2, py + size * 1.1); 
            floorCtx.lineTo(px - size * 1.2, py + size * 1.1); 
            floorCtx.closePath(); 
            floorCtx.fillStyle = '#dc3545'; 
            floorCtx.fill(); 
            floorCtx.stroke();
        }

        function updateDrawingImage() {
            let drawingType = document.getElementById('drawingType').value;
            const baseImgUrl = "https://yehlc.github.io/Tonsin/驗屋圖資"; 
            
            let safeSite = encodeURIComponent(currentSite);
            let safeFloor = encodeURIComponent(currentFloor);
            let safeRoom = encodeURIComponent(currentRoom);
            let safeType = encodeURIComponent(drawingType);
            
            let targetImgSrc = `${baseImgUrl}/${safeSite}/${safeFloor}/${safeRoom}_${safeType}.jpg`;
            
            // 復原縮放與標記
            scale = 1; panX = 0; panY = 0; updateCanvasTransform();
            isSelected = false;
            document.getElementById('mapHint').style.backgroundColor = "rgba(255,234,167,0.9)";
            document.getElementById('mapHint').style.color = "#d63031";
            document.getElementById('mapHint').innerText = "📍 雙指可縮放圖面，點擊「標記缺失」";

            let tempImg = new Image();
            tempImg.onload = () => {
                floorImg.src = targetImgSrc;
                setTimeout(() => {
                    floorCanvas.width = floorImg.width; 
                    floorCanvas.height = floorImg.height;
                    floorCtx.drawImage(floorImg, 0, 0, floorCanvas.width, floorCanvas.height);
                }, 100);
            };
            tempImg.onerror = () => {
                floorImg.src = `https://via.placeholder.com/800x600/ffeaa7/d63031?text=無【${drawingType}】圖檔`;
                setTimeout(() => {
                    floorCanvas.width = floorImg.width; 
                    floorCanvas.height = floorImg.height;
                    floorCtx.drawImage(floorImg, 0, 0, floorCanvas.width, floorCanvas.height);
                }, 100);
            };
            tempImg.src = targetImgSrc;
        }

        // ====== UI 切換 ======
        function switchTab(tab) {
            document.getElementById('tabAdd').classList.remove('active');
            document.getElementById('tabOverview').classList.remove('active');
            document.getElementById('addSection').style.display = 'none';
            document.getElementById('overviewSection').style.display = 'none';
            
            if (tab === 'add') {
                document.getElementById('tabAdd').classList.add('active');
                document.getElementById('addSection').style.display = 'block';
            } else {
                document.getElementById('tabOverview').classList.add('active');
                document.getElementById('overviewSection').style.display = 'block';
                loadDefectsOverview(); 
            }
        }

        function updateUI() {
            document.getElementById('roomTitle').innerText = currentRoom;
            document.getElementById('siteFloorTitle').innerText = `${currentSite} - ${currentFloor}`;
            updateDrawingImage();
        }

        function initSwipe() {
            let touchstartX = 0;
            let touchendX = 0;
            const sa = document.getElementById('swipeArea');
            sa.addEventListener('touchstart', e => { 
                // 確保在圖面上滑動時，不會觸發換房
                if (e.target.id === 'floorPlan' || e.target.closest('#canvas-container')) return;
                touchstartX = e.changedTouches[0].screenX; 
            });
            sa.addEventListener('touchend', e => {
                if (e.target.id === 'floorPlan' || e.target.closest('#canvas-container')) return;
                touchendX = e.changedTouches[0].screenX;
                if (touchendX < touchstartX - 70) changeRoom(1); 
                if (touchendX > touchstartX + 70) changeRoom(-1); 
            });
        }

        // ====== 表單操作 ======
        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('previewImg').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitInspection() {
            if (!isSelected) return alert("⚠️ 請先在上方圖面「點擊標記」缺失位置！");
            let fileInput = document.getElementById('photoInput');
            if (!fileInput.files || fileInput.files.length === 0) return alert("⚠️ 請拍攝缺失照片！");
            let desc = document.getElementById('descriptionInput').value;
            if (!desc.trim()) return alert("⚠️ 請輸入或選擇缺失說明！");

            let btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "⏳ 儲存中...";

            let base64Img = await fileToBase64(fileInput.files[0]);
            let xPercent = Math.round((selectedX / floorCanvas.width) * 100);
            let yPercent = Math.round((selectedY / floorCanvas.height) * 100);
            let coordStr = `[座標] X:${xPercent}%, Y:${yPercent}%`;

            let payload = {
                site: currentSite, floor: currentFloor, roomType: currentRoom,
                drawingType: document.getElementById('drawingType').value,
                location: document.getElementById('locationSelect').value,
                description: desc, imageBase64: base64Img, 
                inspector: currentUser, xyCoord: coordStr
            };

            fetch(`${apiBaseUrl}/submit-inspection`, {
                method: "POST", headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(res => {
                if (res.success) { showToast(); resetForm(); } 
                else { alert("❌ 新增失敗：" + res.error); }
            }).catch(e => alert("❌ 連線異常")).finally(() => {
                btn.disabled = false; btn.innerText = "📤 儲存此筆缺失";
            });
        }

        function resetForm() {
            document.getElementById('descriptionInput').value = "";
            document.getElementById('photoInput').value = "";
            document.getElementById('previewImg').src = "";
            document.getElementById('previewImg').style.display = "none";
            updateDrawingImage();
        }

        // ====== 總覽與匯出 ======
        function loadDefectsOverview() {
            let container = document.getElementById('defectList');
            container.innerHTML = "載入中...";
            
            fetch(`${apiBaseUrl}/room-defects?site=${encodeURIComponent(currentSite)}&floor=${encodeURIComponent(currentFloor)}&room=${encodeURIComponent(currentRoom)}`, {
                headers: { "ngrok-skip-browser-warning": "true" }
            }).then(r => r.json()).then(res => {
                if (res.success && res.data.length > 0) {
                    let html = "";
                    res.data.forEach(d => {
                        html += `
                        <div class="defect-card">
                            <img src="${apiBaseUrl}${d.ImageUrl}?ngrok-skip-browser-warning=true" alt="照片">
                            <div class="defect-info">
                                <span class="defect-tag">${d.Location}</span>
                                <div style="font-size:14px; font-weight:bold; margin-bottom:5px;">${d.Description}</div>
                                <div style="font-size:12px; color:#888;">${d.DrawingType}</div>
                            </div>
                        </div>`;
                    });
                    container.innerHTML = html;
                } else {
                    container.innerHTML = "<div style='text-align:center; padding:20px; color:#888;'>✅ 本戶目前無缺失</div>";
                }
            });
        }

        function exportExcel() {
            let url = `${apiBaseUrl}/export-inspection-excel?site=${encodeURIComponent(currentSite)}&floor=${encodeURIComponent(currentFloor)}&room=${encodeURIComponent(currentRoom)}`;
            window.open(url, '_blank');
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error);
            });
        }
        
        function showToast() {
            var x = document.getElementById("toastMsg");
            x.className = "toast show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
